server.port=${PORT:8081}

spring.application.name=prayagraj-travels

# ── MySQL ────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:prayagraj_bus}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP ─────────────────────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=PrayagrajHikariPool

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# ── Scheduling ───────────────────────────────────────────────────────────────
spring.task.scheduling.pool.size=4

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.travels=DEBUG
logging.level.org.springframework.jdbc=DEBUG

# ── Schema init ───────────────────────────────────────────────────────────────
# Prevent schema.sql from auto-running (DB already initialized)
spring.sql.init.mode=never
