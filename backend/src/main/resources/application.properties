server.port=${PORT}
server.address=0.0.0.0

spring.application.name=prayagraj-travels

# ── MySQL ────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP ─────────────────────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=PrayagrajHikariPool

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.timeout=2000ms

# ── Scheduling ───────────────────────────────────────────────────────────────
spring.task.scheduling.pool.size=4

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.travels=DEBUG
logging.level.org.springframework.jdbc=DEBUG

# ── Schema init ───────────────────────────────────────────────────────────────
# always = run schema.sql on every startup (safe because it uses CREATE IF NOT EXISTS + INSERT IGNORE)
spring.sql.init.mode=never